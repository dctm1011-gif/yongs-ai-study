<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="512" height="512" fill="#ffffff" rx="100"/>
  
  <!-- 곰 몸통 -->
  <circle cx="256" cy="320" r="140" fill="#c9a876"/>
  
  <!-- 곰 머리 -->
  <circle cx="256" cy="160" r="120" fill="#c9a876"/>
  
  <!-- 왼쪽 귀 -->
  <circle cx="160" cy="60" r="50" fill="#c9a876"/>
