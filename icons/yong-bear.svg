  <!-- 왼쪽 발 -->
  <ellipse cx="200" cy="450" rx="50" ry="55" fill="#c9a876"/>
  <!-- 오른쪽 발 -->
  <ellipse cx="312" cy="450" rx="50" ry="55" fill="#c9a876"/>
  
  <!-- 텍스트: Yong -->
  <text x="256" y="380" font-family="Arial, sans-serif" font-size="80" font-weight="bold" text-anchor="middle" fill="#8b7355" letter-spacing="2">
