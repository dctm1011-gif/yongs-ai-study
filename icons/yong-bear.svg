  <!-- 오른쪽 귀 -->
  <circle cx="352" cy="60" r="50" fill="#c9a876"/>
  <circle cx="352" cy="60" r="30" fill="#8b7355"/>
  
  <!-- 왼쪽 눈 흰자위 -->
  <circle cx="216" cy="140" r="28" fill="#ffffff"/>
  <!-- 오른쪽 눈 흰자위 -->
  <circle cx="296" cy="140" r="28" fill="#ffffff"/>
  
  <!-- 왼쪽 눈동자 -->
  <circle cx="220" cy="145" r="18" fill="#3d2817"/>
  <circle cx="224" cy="140" r="6" fill="#ffffff"/>
  
