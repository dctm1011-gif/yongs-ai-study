  <circle cx="300" cy="145" r="18" fill="#3d2817"/>
  <circle cx="304" cy="140" r="6" fill="#ffffff"/>
  
  <!-- 코 -->
  <ellipse cx="256" cy="180" rx="18" ry="20" fill="#8b7355"/>
  <!-- 콧구멍 왼쪽 -->
  <circle cx="245" cy="178" r="4" fill="#5c4a35"/>
  <!-- 콧구멍 오른쪽 -->
  <circle cx="267" cy="178" r="4" fill="#5c4a35"/>
  
  <!-- 입 -->
  <path d="M 256 180 Q 246 200 240 210" stroke="#8b7355" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 256 180 Q 266 200 272 210" stroke="#8b7355" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- 왼쪽 팔 -->
  <ellipse cx="150" cy="300" rx="50" ry="90" fill="#c9a876" transform="rotate(-35 150 300)"/>
  <!-- 왼쪽 손 -->
  <circle cx="120" cy="380" r="45" fill="#c9a876"/>
  
  <!-- 오른쪽 팔 -->
  <ellipse cx="362" cy="300" rx="50" ry="90" fill="#c9a876" transform="rotate(35 362 300)"/>
